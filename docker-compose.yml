version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: luckydraw_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  backend:
    build: ./backend
    container_name: luckydraw_backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/luckydraw
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=luckydraw-secret-key-change-in-production
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/app/storage

  postgres:
    image: postgres:15
    container_name: luckydraw_db
    environment:
      POSTGRES_DB: luckydraw
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d luckydraw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: luckydraw_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
